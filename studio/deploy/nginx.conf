# AUREA — nginx перед Next.js (standalone на :3000).
# Задачи: TLS, редирект на https + www→apex, единая политика trailing slash (301),
# агрессивный кэш иммутабельной статики, проксирование на Node.

# ── HTTP → HTTPS + ACME challenge ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aureadesign.ru www.aureadesign.ru;

    # выпуск/продление сертификата certbot'ом
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://aureadesign.ru$request_uri;
    }
}

# ── www → apex (единый канонический хост) ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.aureadesign.ru;

    ssl_certificate     /etc/letsencrypt/live/aureadesign.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aureadesign.ru/privkey.pem;

    return 301 https://aureadesign.ru$request_uri;
}

# ── Основной хост ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aureadesign.ru;

    ssl_certificate     /etc/letsencrypt/live/aureadesign.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aureadesign.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # gzip (для HTML/JS/CSS/JSON/SVG). Изображения уже сжаты.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # security-заголовки (базовые)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 2m;

    # Иммутабельные ассеты Next (/_next/static/*) — хэш в имени → кэш на год.
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # next/image (оптимизатор) — кэшируем ответы, отдаём современные форматы.
    location /_next/image {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # Статика из /public (видео, постеры, иконки) — умеренный кэш.
    location ~* \.(mp4|webm|jpg|jpeg|png|webp|avif|svg|ico|woff2)$ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Всё остальное — на Node. HTML не кэшируем на nginx (ISR/ревалидация — в Next).
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
