# AUREA — nginx HTTP-режим (до выпуска SSL).
# Используется для: (1) проверки сайта по http://<IP> ДО переключения DNS;
# (2) отдачи ACME-challenge при выпуске сертификата certbot'ом.
# После получения сертификата переключаемся на nginx.https.conf (см. DEPLOY.md).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;                       # ловит и IP, и любой хост

    # ACME challenge для выпуска/продления сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    add_header X-Content-Type-Options nosniff always;
    client_max_body_size 2m;

    # иммутабельные ассеты Next
    location /_next/static/ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /_next/image {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }
    location ~* \.(mp4|webm|jpg|jpeg|png|webp|avif|svg|ico|woff2)$ {
        proxy_pass http://web:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
