# AUREA — прод-стек на VPS: Next.js (Node) + nginx (TLS, кэш статики, 301).
# Запуск:  docker compose up -d --build
# Обновление:  git pull && docker compose up -d --build

services:
  web:
    build: .
    container_name: aurea-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000" # наружу не публикуем — только через nginx
    # healthcheck: контейнер считается готовым, когда отвечает главная
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: aurea-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # сертификаты Let's Encrypt (см. DEPLOY.md → certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME-challenge для выпуска/продления
      - ./deploy/certbot-www:/var/www/certbot:ro
