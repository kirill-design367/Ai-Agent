# AUREA — прод-стек: Next.js (Node) + nginx + certbot (авто-SSL).
#
# Два пути выкатки (см. DEPLOY.md):
#   CI/CD  — образ собран в GitHub Actions и лежит в GHCR: сервер только `pull`.
#            .env: IMAGE=ghcr.io/<owner>/aurea-web:<tag>
#   Fallback (если ghcr.io недоступен из РФ) — сборка на сервере со swap:
#            docker compose build web   (IMAGE не задан → тег aurea-web:local)
#
# Переключение nginx http→https — через .env: NGINX_CONF (см. DEPLOY.md).

services:
  web:
    image: ${IMAGE:-aurea-web:local}
    build: .                              # используется только в fallback-пути
    container_name: aurea-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"                            # наружу не публикуем — только через nginx
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  nginx:
    # Базовый образ зеркалируется в GHCR (сервер в РФ ловит 429 от docker.io).
    # Переопределить на аварийный docker.io: NGINX_IMAGE=nginx:1.27-alpine в .env.
    image: ${NGINX_IMAGE:-ghcr.io/kirill-design367/aurea-nginx:1.27-alpine}
    container_name: aurea-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # HTTP-режим по умолчанию (проверка по IP); после SSL — NGINX_CONF=./deploy/nginx.https.conf
      - ${NGINX_CONF:-./deploy/nginx.http.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    # каждые 6ч перечитываем конфиг → подхватываем продлённые сертификаты
    command: >
      sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'

  # Авто-продление сертификата (каждые 12ч). Первичный выпуск — разово в DEPLOY.md.
  certbot:
    # Тоже из GHCR-зеркала: авто-продление каждые 12ч работает на уже скачанном
    # образе и docker.io не трогает. Аварийно: CERTBOT_IMAGE=certbot/certbot в .env.
    image: ${CERTBOT_IMAGE:-ghcr.io/kirill-design367/aurea-certbot:latest}
    container_name: aurea-certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  certbot-conf:
  certbot-www:
