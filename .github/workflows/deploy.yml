name: Deploy AUREA (VPS)

# Автодеплой прод-сайта: сборка образа В GitHub Actions (не на 4 ГБ сервере — иначе OOM),
# публикация в GHCR, деплой по SSH с health-check и авто-откатом.
# Триггеры: push в main + ручной запуск (Actions → Run workflow).
#
# Нужные секреты репозитория (Settings → Secrets and variables → Actions):
#   SSH_HOST   — IP/домен сервера           (напр. 104.171.137.47)
#   SSH_USER   — пользователь деплоя         (deploy — создаётся bootstrap.sh)
#   SSH_KEY    — приватный ключ этого пользователя (ed25519, целиком)
#   GHCR_TOKEN — PAT с правом read:packages  (сервер тянет образы из ghcr.io)
# Опционально (если раннер начнёт ловить 429 от docker.io при зеркалировании):
#   DOCKERHUB_USER, DOCKERHUB_TOKEN — вход в Docker Hub только внутри Actions.
# Публичный ключ к SSH_KEY передаётся в bootstrap.sh как DEPLOY_PUBKEY.
#
# Почему зеркалируем nginx/certbot в GHCR: сервер в РФ (Timeweb MSK) ловит
# 429 Too Many Requests при анонимном pull с docker.io. Поэтому базовые образы
# копируются в GHCR В Actions (там лимитов нет), а сервер тянет ВСЁ из одного
# реестра — ghcr.io, которым мы управляем. docker.io на сервере не участвует.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aurea-web
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Опциональный вход в Docker Hub — только если заданы секреты. Поднимает
      # лимиты pull для раннера (сервера это не касается).
      - name: Login to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_USER != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMG="${REGISTRY,,}/${IMAGE_NAME,,}"
          OWNER="${{ github.repository_owner }}"; OWNER="${OWNER,,}"
          echo "IMG=${IMG}" >> "$GITHUB_ENV"
          echo "OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "image=${IMG}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./studio                 # Dockerfile + код приложения — в studio/
          push: true
          tags: |
            ${{ env.IMG }}:${{ github.sha }}
            ${{ env.IMG }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Зеркалируем базовые образы в GHCR (обход лимитов docker.io на сервере).
      # imagetools копирует манифест registry→registry, без выкачивания на раннер,
      # с сохранением мультиарх. Держим свои теги — сервер тянет только их.
      - name: Mirror nginx & certbot to GHCR
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${OWNER}/aurea-nginx:1.27-alpine \
            docker.io/library/nginx:1.27-alpine
          docker buildx imagetools create \
            --tag ghcr.io/${OWNER}/aurea-certbot:latest \
            docker.io/certbot/certbot:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull + health-check + auto-rollback)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/aurea
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            cd studio
            bash scripts/deploy-remote.sh "${{ needs.build.outputs.image }}"
