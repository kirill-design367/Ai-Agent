      <rect x="30" y="100" width="12" height="400" rx="4"/>
      <rect x="80" y="80" width="10" height="420" rx="3"/>
      <rect x="140" y="60" width="14" height="440" rx="4"/>
      <!-- Palm fronds -->
      <path d="M36 100 Q-20 80 -40 50 Q0 90 36 100 Z"/>
      <path d="M36 100 Q50 60 40 20 Q42 70 36 100 Z"/>
      <path d="M36 100 Q80 75 100 45 Q70 85 36 100 Z"/>
      <path d="M36 130 Q-10 120 -30 100 Q10 125 36 130 Z"/>
      <path d="M85 80 Q50 55 35 30 Q65 65 85 80 Z"/>
