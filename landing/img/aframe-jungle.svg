      <line x1="14" y1="308" x2="156" y2="308" stroke="#1a1a1a" stroke-width="3"/>
      <line x1="36" y1="228" x2="134" y2="228" stroke="#1a1a1a" stroke-width="2.5"/>
      <line x1="22" y1="268" x2="148" y2="268" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="55" y1="164" x2="115" y2="164" stroke="#1a1a1a" stroke-width="1.5"/>
