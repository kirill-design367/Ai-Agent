      <line x1="290" y1="580" x2="350" y2="455"/><line x1="310" y1="580" x2="365" y2="455"/>
      <line x1="330" y1="580" x2="380" y2="455"/><line x1="350" y1="580" x2="395" y2="455"/>
      <line x1="370" y1="580" x2="410" y2="455"/><line x1="390" y1="580" x2="425" y2="455"/>
      <line x1="410" y1="580" x2="440" y2="455"/><line x1="430" y1="580" x2="455" y2="455"/>
      <line x1="450" y1="580" x2="470" y2="455"/><line x1="470" y1="580" x2="485" y2="455"/>
      <line x1="490" y1="580" x2="500" y2="455"/><line x1="510" y1="580" x2="515" y2="455"/>
      <line x1="530" y1="580" x2="530" y2="455"/><line x1="550" y1="580" x2="545" y2="455"/>
      <line x1="570" y1="580" x2="558" y2="455"/><line x1="590" y1="580" x2="572" y2="455"/>
      <line x1="610" y1="580" x2="586" y2="455"/>
    </g>
    <!-- boardwalk horizontal boards -->
