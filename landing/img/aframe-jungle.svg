      <path d="M767 50 Q800 30 810 5 Q790 40 767 50 Z"/>
      <path d="M767 50 Q770 20 765 -5 Q768 35 767 50 Z"/>
      <path d="M826 80 Q790 60 775 35 Q805 68 826 80 Z"/>
      <path d="M826 80 Q855 58 865 32 Q848 68 826 80 Z"/>
      <path d="M878 40 Q845 22 830 -5 Q858 32 878 40 Z"/>
