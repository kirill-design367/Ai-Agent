    <path fill="#0a1208" opacity="0.95" d="M0 250 Q30 200 60 240 Q80 185 110 235 Q140 195 170 245 Q200 180 230 240 Q260 200 290 248 Q320 185 350 242 Q380 195 410 248 Q440 182 470 246 Q500 200 530 250 Q560 188 590 246 Q620 195 650 248 Q680 182 710 244 Q740 200 770 250 Q800 188 830 246 Q860 200 900 250 L900 0 L0 0 Z"/>

