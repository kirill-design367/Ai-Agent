        <rect x="18" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="40" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="62" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="84" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="106" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="128" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="150" y="296" width="2.5" height="12" rx="0.5"/>
        <rect x="172" y="296" width="2.5" height="12" rx="0.5"/>
