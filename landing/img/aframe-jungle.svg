      <line x1="15" y1="358" x2="185" y2="358" stroke="#1a1a1a" stroke-width="4"/>
      <!-- horizontal bars -->
      <line x1="43" y1="268" x2="157" y2="268" stroke="#1a1a1a" stroke-width="3"/>
      <line x1="27" y1="312" x2="173" y2="312" stroke="#1a1a1a" stroke-width="2.5"/>
      <line x1="62" y1="190" x2="138" y2="190" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="78" y1="135" x2="122" y2="135" stroke="#1a1a1a" stroke-width="1.5"/>
