    <!-- Ground foliage / ferns -->
    <g fill="#0f1a0e" opacity="0.8">
      <path d="M240 560 Q260 520 280 510 Q262 535 240 560 Z"/>
      <path d="M230 590 Q258 548 282 534 Q256 560 230 590 Z"/>
      <path d="M280 550 Q300 516 320 505 Q300 528 280 550 Z"/>
      <path d="M620 555 Q640 518 660 508 Q638 530 620 555 Z"/>
      <path d="M640 580 Q665 540 685 528 Q660 552 640 580 Z"/>
      <path d="M680 560 Q700 524 720 514 Q698 536 680 560 Z"/>
      <!-- bigger plants around base -->
      <path d="M100 540 Q130 495 155 482 Q128 512 100 540 Z" opacity="0.9"/>
      <path d="M80 580 Q118 532 148 516 Q114 545 80 580 Z" opacity="0.9"/>
      <path d="M750 545 Q775 502 798 490 Q774 514 750 545 Z" opacity="0.9"/>
      <path d="M770 580 Q800 535 825 520 Q798 548 770 580 Z" opacity="0.9"/>
    </g>

    <!-- Rocks alongside boardwalk -->
    <g fill="#1e1c18">
      <ellipse cx="300" cy="530" rx="18" ry="10"/><ellipse cx="325" cy="548" rx="12" ry="7"/>
      <ellipse cx="670" cy="525" rx="15" ry="9"/><ellipse cx="695" cy="542" rx="10" ry="6"/>
    </g>

    <!-- Ground step light spots -->
    <g filter="url(#gblur3-sm)" opacity="0.25">
      <ellipse cx="350" cy="475" rx="15" ry="8" fill="#ffcc44"/>
      <ellipse cx="400" cy="460" rx="12" ry="6" fill="#ffcc44"/>
      <ellipse cx="450" cy="448" rx="12" ry="6" fill="#ffcc44"/>
      <ellipse cx="540" cy="455" rx="12" ry="6" fill="#ffcc44"/>
    </g>

    <!-- Sky atmosphere / moon glow -->
    <ellipse cx="800" cy="60" rx="80" ry="60" fill="#2a3550" filter="url(#gblur3-lg)" opacity="0.4"/>
    <circle cx="810" cy="55" r="22" fill="#dde4f5" opacity="0.25"/>

    <!-- Vignette -->
    <defs>
      <radialGradient id="vig3" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
      </radialGradient>
