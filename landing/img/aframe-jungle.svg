      <path d="M0 500 Q35 460 60 445 Q30 470 0 500 Z"/>
      <path d="M10 520 Q45 480 65 465 Q40 490 10 520 Z"/>
      <path d="M30 550 Q60 510 85 495 Q55 520 30 550 Z"/>
      <path d="M60 580 Q90 540 115 525 Q85 550 60 580 Z"/>
