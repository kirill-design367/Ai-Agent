      <!-- ROOF - dramatic dark triangle, steep -->
      <path d="M-5 360 L100 30 L205 360 Z" fill="#1a1512"/>
      <!-- metal roof - highlight seam -->
      <path d="M100 30 L100 360" stroke="#252218" stroke-width="3" opacity="0.5"/>
      <!-- roof sheen -->
