        <rect x="100" y="344" width="3" height="14" rx="1"/><rect x="125" y="344" width="3" height="14" rx="1"/>
        <rect x="150" y="344" width="3" height="14" rx="1"/><rect x="175" y="344" width="3" height="14" rx="1"/>
