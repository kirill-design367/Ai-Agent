      <line x1="290" y1="570" x2="610" y2="570"/>
      <line x1="300" y1="540" x2="600" y2="540"/>
      <line x1="310" y1="512" x2="590" y2="512"/>
      <line x1="320" y1="486" x2="580" y2="486"/>
      <line x1="330" y1="462" x2="568" y2="462"/>
      <line x1="340" y1="443" x2="558" y2="443"/>
