      <g stroke="#221a10" stroke-width="1.5" opacity="0.7">
        <line x1="-25" y1="362" x2="225" y2="362"/>
        <line x1="-25" y1="368" x2="225" y2="368"/>
        <line x1="-25" y1="374" x2="225" y2="374"/>
