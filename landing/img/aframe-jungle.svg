<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2535"/>
      <stop offset="50%" stop-color="#151c28"/>
      <stop offset="100%" stop-color="#0e1418"/>
    </linearGradient>
    <radialGradient id="af-glow" cx="50%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#ee9944" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#cc7722" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#884400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="af-glow2" cx="50%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#dd8833" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#773311" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="af-glow3" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#cc7722" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#662200" stop-opacity="0"/>
    </radialGradient>
    <filter id="gblur3">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="gblur3-sm">
